name: Build CapCut No Protection dylib only
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew install make ldid
          echo "/opt/homebrew/opt/make/libexec/gnubin" >> $GITHUB_PATH

      - name: Setup Theos
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          if [ ! -d "$THEOS" ]; then
            git clone --recursive https://github.com/theos/theos.git $THEOS
          fi

      - name: Download SDKs
        run: |
          cd $THEOS
          mkdir -p sdks
          curl -L https://github.com/theos/sdks/archive/refs/heads/master.zip -o sdk.zip
          unzip -o sdk.zip
          cp -R sdks-master/* sdks/
          rm -rf sdks-master sdk.zip

      - name: Build Tweak (dylib only)
        run: |
          cd $GITHUB_WORKSPACE
          make all
          # استخراج ملف dylib الناتج مباشرة
          find .theos -name "*.dylib" -exec cp {} ./ \;
          ls -la *.dylib

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: CapCutNoProtection_dylib
          path: ./*.dylib
