name: Build CapCut VIP Tweak

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          export THEOS=$HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Build Tweak (dylib)
        run: |
          export THEOS=$HOME/theos
          make clean
          make
          echo "✅ Tweak built! Checking output..."

      - name: Upload dylib as artifact
        uses: actions/upload-artifact@v4
        with:
          name: CapCutVIP.dylib
          path: .theos/obj/debug/CapCutVIP.dylib
